<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChanryTabStash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fira+Code&family=Noto+Sans+TC:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    /* Cute Global Styles */
    :root {
      --color-bg: #F4FAF9;
      --color-primary: #C7EDD2;
      --color-secondary: #AEC6CF;
    }

    body {
      background-color: var(--color-bg);
      color: #555555;
      font-family: 'Nunito', 'Noto Sans TC', 'Noto Sans JP', sans-serif;
      width: 600px;
      min-height: 600px;
      /* Soft pattern background */
      background-image: radial-gradient(#dcf0eb 2px, transparent 2px);
      background-size: 30px 30px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #fdfdfd;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #bce3db;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #84ccba;
    }

    /* Soft shadow blocks */
    .cute-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(132, 204, 186, 0.15);
      border: 2px solid #eef7f5;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>

</body>

</html>
